<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Archive — 시작하기</title>
  <script>
    (() => {
      try {
        const settings = JSON.parse(localStorage.getItem('life_archive_settings') || '{}');
        if (settings.theme === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/lock.css" />
</head>
<body class="lock-body">

  <main class="lock-page">
    <section class="lock-card lock-card-wide decor-border">

      <header class="lock-header">
        <p class="lock-eyebrow">Life Archive</p>
        <h1 class="lock-title">기억을 시작합니다</h1>
        <p class="lock-sub">간단히 환경을 설정해주세요</p>
      </header>

      <form id="setup-form" class="setup-form" autocomplete="off" novalidate>

        <div class="form-group">
          <label class="input-label" for="setup-nickname">닉네임 (선택)</label>
          <input
            id="setup-nickname"
            class="input"
            type="text"
            maxlength="20"
            placeholder="이름 또는 별명"
          />
        </div>

        <div class="form-group">
          <label class="input-label" for="setup-pin">PIN 4자리</label>
          <input
            id="setup-pin"
            class="input"
            type="password"
            inputmode="numeric"
            pattern="[0-9]{4}"
            maxlength="4"
            placeholder="• • • •"
            required
          />
        </div>

        <div class="form-group">
          <label class="input-label" for="setup-pin-confirm">PIN 확인</label>
          <input
            id="setup-pin-confirm"
            class="input"
            type="password"
            inputmode="numeric"
            pattern="[0-9]{4}"
            maxlength="4"
            placeholder="• • • •"
            required
          />
        </div>

        <label class="setup-check">
          <input id="setup-sample" type="checkbox" checked />
          <span>샘플 기억 5개로 시작하기</span>
        </label>

        <p id="setup-error" class="lock-error" role="alert"></p>

        <button type="submit" class="btn btn-primary btn-lg btn-full">
          시작하기
        </button>
      </form>

    </section>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/setup.js"></script>
</body>
</html>
