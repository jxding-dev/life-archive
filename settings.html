<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Archive — 설정</title>
  <script>
    (() => {
      try {
        const settings = JSON.parse(localStorage.getItem('life_archive_settings') || '{}');
        if (settings.theme === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/settings.css" />
</head>
<body>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-title">Life Archive</div>
        <div class="sidebar-logo-sub">memory · regret</div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item" href="./index.html">홈</a>
        <a class="nav-item" href="./archive.html">아카이브</a>
        <a class="nav-item" href="./write.html">기록</a>
        <a class="nav-item" href="./timeline.html">타임라인</a>
        <a class="nav-item" href="./export.html">백업</a>
        <a class="nav-item active" href="./settings.html">설정</a>
      </nav>

      <div class="sidebar-quote">
        <p>기억은 사라지지 않는다,<br />다만 흩어질 뿐이다.</p>
      </div>
    </aside>

    <nav class="mobile-nav" aria-label="모바일 네비게이션">
      <div class="mobile-nav-inner">
        <a class="mobile-nav-item" href="./index.html">홈</a>
        <a class="mobile-nav-item" href="./archive.html">아카이브</a>
        <a class="mobile-nav-item" href="./write.html">기록</a>
        <a class="mobile-nav-item" href="./timeline.html">타임라인</a>
        <a class="mobile-nav-item" href="./export.html">백업</a>
        <a class="mobile-nav-item active" href="./settings.html">설정</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">

        <header class="settings-header">
          <p class="label-text">Settings</p>
          <h1 class="page-title">설정</h1>
          <p class="page-subtitle">잠금과 이름, 데이터를 관리합니다</p>
        </header>

        <section class="settings-section">
          <h2 class="section-title">닉네임</h2>
          <form id="nickname-form" class="settings-form" autocomplete="off">
            <div class="form-group">
              <label class="input-label" for="settings-nickname">닉네임</label>
              <input id="settings-nickname" class="input" type="text" maxlength="20" />
            </div>
            <button type="submit" class="btn btn-primary">저장</button>
            <p id="nickname-message" class="settings-message" role="status"></p>
          </form>
        </section>

        <section class="settings-section">
          <h2 class="section-title">테마</h2>
          <form id="theme-form" class="settings-form" autocomplete="off">
            <div class="form-group">
              <label class="input-label" for="settings-theme">화면 테마</label>
              <select id="settings-theme" class="input">
                <option value="sepia">세피아</option>
                <option value="dark">다크모드</option>
              </select>
            </div>
            <p id="theme-message" class="settings-message" role="status"></p>
          </form>
        </section>

        <section class="settings-section">
          <h2 class="section-title">PIN 변경</h2>
          <form id="pin-form" class="settings-form" autocomplete="off" novalidate>
            <div class="form-group">
              <label class="input-label" for="settings-old-pin">현재 PIN</label>
              <input id="settings-old-pin" class="input" type="password" inputmode="numeric" maxlength="4" />
            </div>
            <div class="form-group">
              <label class="input-label" for="settings-new-pin">새 PIN</label>
              <input id="settings-new-pin" class="input" type="password" inputmode="numeric" maxlength="4" />
            </div>
            <div class="form-group">
              <label class="input-label" for="settings-new-pin-confirm">새 PIN 확인</label>
              <input id="settings-new-pin-confirm" class="input" type="password" inputmode="numeric" maxlength="4" />
            </div>
            <button type="submit" class="btn btn-primary">PIN 변경</button>
            <p id="pin-message" class="settings-message" role="alert"></p>
          </form>
        </section>

        <section class="settings-section settings-danger">
          <h2 class="section-title">초기화</h2>
          <p class="body-text">기록만 비우거나, 앱 설정까지 모두 처음 상태로 되돌립니다.</p>
          <div class="settings-form">
            <button type="button" class="btn btn-danger" id="reset-records">전체 기록 초기화</button>
            <button type="button" class="btn btn-danger" id="reset-app">앱 전체 초기화</button>
          </div>
          <p id="reset-message" class="settings-message" role="alert"></p>
        </section>

      </div>
    </main>
  </div>

  <script src="./js/utils.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/imageStorage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
