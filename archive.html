<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Archive — 아카이브</title>
  <script>
    (() => {
      try {
        const settings = JSON.parse(localStorage.getItem('life_archive_settings') || '{}');
        if (settings.theme === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/archive.css" />
</head>
<body>

  <div class="app-layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-title">Life Archive</div>
        <div class="sidebar-logo-sub">memory · regret</div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item" href="./index.html">홈</a>
        <a class="nav-item active" href="./archive.html">아카이브</a>
        <a class="nav-item" href="./write.html">기록</a>
        <a class="nav-item" href="./timeline.html">타임라인</a>
        <a class="nav-item" href="./settings.html">설정</a>
      </nav>

      <div class="sidebar-quote">
        <p>기억은 사라지지 않는다,<br />다만 흩어질 뿐이다.</p>
      </div>
    </aside>

    <nav class="mobile-nav" aria-label="모바일 네비게이션">
      <div class="mobile-nav-inner">
        <a class="mobile-nav-item" href="./index.html">홈</a>
        <a class="mobile-nav-item active" href="./archive.html">아카이브</a>
        <a class="mobile-nav-item" href="./write.html">기록</a>
        <a class="mobile-nav-item" href="./timeline.html">타임라인</a>
        <a class="mobile-nav-item" href="./settings.html">설정</a>
      </div>
    </nav>

    <!-- 메인 -->
    <main class="main-content">
      <div class="container">

        <header class="archive-header">
          <p class="label-text">Archive</p>
          <h1 class="page-title">기억 아카이브</h1>
          <p class="page-subtitle">연도와 감정으로 거슬러 올라가요</p>
        </header>

        <!-- 필터 -->
        <section class="archive-filters" aria-label="필터">

          <div class="archive-search">
            <input
              id="f-keyword"
              class="input"
              type="search"
              placeholder="제목 · 본문 · 태그로 찾기"
              maxlength="60"
            />
          </div>

          <div class="archive-filter-row">
            <select id="f-year" class="input archive-select" aria-label="연도 필터">
              <option value="">전체 연도</option>
            </select>

            <button type="button" class="btn btn-ghost btn-sm" id="f-reset">필터 초기화</button>
          </div>

          <div class="archive-emotion-list" id="f-emotions" aria-label="감정 필터"></div>
        </section>

        <div class="divider-ornament"><span>· · ·</span></div>

        <!-- 결과 카운트 -->
        <p class="archive-meta" id="archive-meta"></p>

        <!-- 결과 영역 -->
        <section id="archive-result" class="archive-result"></section>

      </div>
    </main>
  </div>

  <script src="./js/utils.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/imageStorage.js"></script>
  <script src="./js/emotion.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/archive.js"></script>
</body>
</html>
