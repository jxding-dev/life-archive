<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Archive — 백업</title>
  <script>
    (() => {
      try {
        const settings = JSON.parse(localStorage.getItem('life_archive_settings') || '{}');
        if (settings.theme === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/export.css" />
</head>
<body>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-title">Life Archive</div>
        <div class="sidebar-logo-sub">memory · regret</div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item" href="./index.html">홈</a>
        <a class="nav-item" href="./archive.html">아카이브</a>
        <a class="nav-item" href="./write.html">기록</a>
        <a class="nav-item" href="./timeline.html">타임라인</a>
        <a class="nav-item active" href="./export.html">백업</a>
        <a class="nav-item" href="./settings.html">설정</a>
      </nav>

      <div class="sidebar-quote">
        <p>기억은 사라지지 않는다,<br />다만 흩어질 뿐이다.</p>
      </div>
    </aside>

    <nav class="mobile-nav" aria-label="모바일 네비게이션">
      <div class="mobile-nav-inner">
        <a class="mobile-nav-item" href="./index.html">홈</a>
        <a class="mobile-nav-item" href="./archive.html">아카이브</a>
        <a class="mobile-nav-item" href="./write.html">기록</a>
        <a class="mobile-nav-item" href="./timeline.html">타임라인</a>
        <a class="mobile-nav-item active" href="./export.html">백업</a>
        <a class="mobile-nav-item" href="./settings.html">설정</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">

        <header class="export-header">
          <p class="label-text">Backup</p>
          <h1 class="page-title">백업</h1>
          <p class="page-subtitle">기억을 내보내고 다시 불러옵니다</p>
        </header>

        <section class="export-section">
          <h2 class="section-title">JSON 내보내기</h2>
          <p class="body-text">기억, 설정, 이미지 데이터를 하나의 JSON 파일로 저장합니다.</p>
          <button type="button" class="btn btn-primary" id="export-json">JSON 내려받기</button>
        </section>

        <section class="export-section">
          <h2 class="section-title">JSON 불러오기</h2>
          <p class="body-text">기존 데이터는 백업 파일 내용으로 덮어씁니다.</p>
          <label class="btn btn-outline export-file-button" for="import-json">파일 선택</label>
          <input id="import-json" class="export-file-input" type="file" accept="application/json,.json" />
          <p id="import-message" class="export-message" role="alert"></p>
        </section>

        <section class="export-section">
          <h2 class="section-title">TXT 내보내기</h2>
          <p class="body-text">사람이 읽기 쉬운 문서 형태로 기억을 저장합니다.</p>
          <button type="button" class="btn btn-primary" id="export-txt">TXT 내려받기</button>
        </section>

      </div>
    </main>
  </div>

  <script src="./js/utils.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/imageStorage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/backup.js"></script>
</body>
</html>
