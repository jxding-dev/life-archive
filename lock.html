<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Archive — 잠금</title>
  <script>
    (() => {
      try {
        const settings = JSON.parse(localStorage.getItem('life_archive_settings') || '{}');
        if (settings.theme === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/lock.css" />
</head>
<body class="lock-body">

  <main class="lock-page">
    <section class="lock-card decor-border" id="lock-card">

      <header class="lock-header">
        <p class="lock-eyebrow">Life Archive</p>
        <h1 class="lock-title">기억의 문</h1>
        <p class="lock-sub">PIN 네 자리를 입력해주세요</p>
      </header>

      <form class="lock-form" id="lock-form" autocomplete="off" novalidate>

        <div class="lock-dots" id="lock-dots" aria-hidden="true">
          <span class="lock-dot"></span>
          <span class="lock-dot"></span>
          <span class="lock-dot"></span>
          <span class="lock-dot"></span>
        </div>

        <input
          id="lock-input"
          class="lock-input"
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="4"
          autocomplete="off"
          autofocus
          aria-label="PIN 4자리 입력"
        />

        <p class="lock-error" id="lock-error" role="alert"></p>
      </form>

      <div class="divider-ornament"><span>· · ·</span></div>

      <p class="lock-hint">탭을 닫으면 자동으로 잠깁니다</p>
    </section>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/lock.js"></script>
</body>
</html>
